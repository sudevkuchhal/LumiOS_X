; ==========================================================
; LumiOS X
; PlatformIO Configuration
; ==========================================================

[env:esp32dev]

platform = espressif32
board = esp32dev
framework = arduino

; ==========================================================
; Serial
; ==========================================================

monitor_speed = 115200
upload_speed = 921600

; ==========================================================
; File System
; ==========================================================

board_build.filesystem = littlefs

; v1.0 — OTA System requires two app partitions (ota_0/ota_1) plus
; otadata. PlatformIO's "default.csv" table for esp32dev already
; provides these on a 4MB flash chip (the assumption this project was
; built against). Pinned explicitly here (rather than left implicit)
; so it's obvious what OTA depends on. HARDWARE VALIDATION REQUIRED:
; confirm your physical board's flash size before relying on OTA in
; the field — a 2MB board needs a smaller custom partition table.
board_build.partitions = default.csv

platform_packages =
    platformio/tool-mklittlefs@^1.203.210628

; ==========================================================
; Build
; ==========================================================

build_flags =
    -D CORE_DEBUG_LEVEL=3

; ==========================================================
; Libraries
; ==========================================================

lib_deps =
    olikraus/U8g2@^2.36.18

    ESP32Async/ESPAsyncWebServer@^3.8.1
    ESP32Async/AsyncTCP@^3.4.8

    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.15

    knolleary/PubSubClient@^2.8